    <text x="860" y="420" font-size="34" fill="#ff8e8e">猫</text>
    <text x="1020" y="520" font-size="30" fill="#ffd0f0">☆ 色</text>
    <text x="940" y="580" font-size="32" fill="#ff8e8e">花</text>
    <text x="1080" y="380" font-size="28" fill="#ff8e8e">夢</text>
