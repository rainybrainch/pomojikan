  <!-- 下部情報 -->
  <rect x="80" y="630" width="1120" height="60" fill="rgba(0,0,0,0.4)" rx="6"/>
  <text x="120" y="668" font-family="Noto Serif JP, serif" font-size="18" fill="#ffe28a" letter-spacing="3">⭐ パーティ育成</text>
  <text x="380" y="668" font-family="Noto Serif JP, serif" font-size="18" fill="#ffe28a" letter-spacing="3">📚 96 カテゴリ図鑑</text>
  <text x="670" y="668" font-family="Noto Serif JP, serif" font-size="18" fill="#ffe28a" letter-spacing="3">☆ 段階解放</text>
  <text x="900" y="668" font-family="Noto Serif JP, serif" font-size="18" fill="#ffe28a" letter-spacing="3">🌧 物理エンジン</text>
