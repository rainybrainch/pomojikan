<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1426"/>
      <stop offset="1" stop-color="#131c33"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="rgba(201,168,76,0.18)"/>
      <stop offset="1" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="640" cy="360" r="320" fill="url(#glow)"/>
  <!-- 上部タイトル -->
  <text x="640" y="110" font-family="Noto Serif JP, serif" font-size="48" font-weight="900" fill="#c9a84c" text-anchor="middle" letter-spacing="14">🌑 ぽもじかん</text>
