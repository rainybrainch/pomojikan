  <text x="640" y="375" font-family="JetBrains Mono, monospace" font-size="72" font-weight="700" fill="#ffe28a" text-anchor="middle">25:00</text>
  <text x="640" y="410" font-family="Noto Serif JP, serif" font-size="14" fill="#5a6890" text-anchor="middle" letter-spacing="6">FOCUS / WORK</text>
