    <text x="380" y="320" font-size="38" fill="#e8c668">雨</text>
    <text x="160" y="520" font-size="32" fill="#ffd0f0">☆ 神</text>
    <text x="280" y="600" font-size="34" fill="#e8c668">雲</text>
    <text x="440" y="540" font-size="36" fill="#ffffff" opacity="0.85">🌈虹</text>
    <text x="180" y="380" font-size="30" fill="#e8c668">道</text>
    <text x="240" y="180" font-size="28" fill="#c890d8">風</text>
  </g>
  <!-- 上がる文字（泡ぽもじ） -->
