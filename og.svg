<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1426"/>
      <stop offset="1" stop-color="#131c33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="540" ry="280" fill="url(#glow)"/>

  <!-- 砂時計シンボル -->
  <g transform="translate(150, 165)">
    <path d="M0 0 L240 0 L240 130 Q240 150 120 150 Q0 150 0 130 Z" fill="#ff6b6b" opacity="0.45"/>
    <circle cx="120" cy="150" r="6" fill="#c9a84c"/>
    <path d="M0 300 L240 300 L240 170 Q240 150 120 150 Q0 150 0 170 Z" fill="#c9a84c" opacity="0.75"/>
    <line x1="-10" y1="0" x2="250" y2="0" stroke="#eef2ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-10" y1="300" x2="250" y2="300" stroke="#eef2ff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- タイトル -->
  <g transform="translate(460, 200)" fill="#eef2ff" font-family="'Noto Serif JP', serif" font-weight="900">
    <text font-size="92" letter-spacing="14">ぽもじかん</text>
    <text y="50" font-size="26" fill="#c9a84c" font-weight="700" letter-spacing="4">v2.9 ／ 22,160 種類の言葉が降る作業タイマー</text>
    <text y="86" font-size="20" fill="#c890d8" font-weight="700" letter-spacing="3">漢字 ・ 古典 ・ 神話 ・ 科学 ・ 料理 ・ 美術 …</text>
  </g>

  <!-- 集中ぽもじ（落下） -->
  <g font-family="'Noto Serif JP', serif" font-weight="700">
    <text x="490" y="380" font-size="36" fill="#e8c668" opacity="0.9">桜</text>
    <text x="550" y="380" font-size="36" fill="#e8c668" opacity="0.75">月</text>
    <text x="610" y="380" font-size="32" fill="#ffd0f0" opacity="0.85">☆神</text>
    <text x="690" y="380" font-size="36" fill="#e8c668" opacity="0.7">雲</text>
    <text x="750" y="380" font-size="32" fill="#ffe28a" opacity="0.85">☆雨</text>
    <text x="490" y="440" font-size="28" fill="#e8c668" opacity="0.55">古</text>
    <text x="540" y="440" font-size="28" fill="#e8c668" opacity="0.6">道</text>
    <text x="585" y="440" font-size="28" fill="#ffffff" opacity="0.9">🌈虹</text>
    <text x="660" y="440" font-size="28" fill="#e8c668" opacity="0.5">真</text>
    <text x="710" y="440" font-size="28" fill="#e8c668" opacity="0.45">理</text>
  </g>
  <!-- 休憩ぽもじ（上昇）少量 -->
  <g font-family="'Noto Serif JP', serif" font-weight="700">
    <text x="800" y="480" font-size="28" fill="#ff8e8e" opacity="0.7">食</text>
    <text x="850" y="480" font-size="28" fill="#ff8e8e" opacity="0.6">音</text>
    <text x="900" y="480" font-size="28" fill="#ff8e8e" opacity="0.55">花</text>
  </g>

  <!-- フッタータグ -->
  <g transform="translate(460, 540)" fill="#c9a84c" font-family="'JetBrains Mono', monospace" font-size="18" letter-spacing="3">
    <text>POMODORO × ENCYCLOPEDIA × PARTY × ☆ RARITY</text>
  </g>

  <!-- 雨粒装飾 -->
  <g stroke="#6bb6ff" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <line x1="50" y1="50" x2="45" y2="80"/>
    <line x1="100" y1="30" x2="95" y2="55"/>
    <line x1="1100" y1="60" x2="1095" y2="90"/>
    <line x1="1150" y1="30" x2="1145" y2="55"/>
    <line x1="80" y1="540" x2="75" y2="570"/>
    <line x1="1120" y1="540" x2="1115" y2="570"/>
  </g>
</svg>
